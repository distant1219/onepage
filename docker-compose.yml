version: '3.3'

services:
  onepage:
    build: .
    container_name: onepage
    ports:
      - "8080:8080"
    volumes:
      - ./onepage.toml:/app/config/onepage.toml:ro
    environment:
      - RUST_LOG=info
      - CONFIG_PATH=/app/config/onepage.toml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
